<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1F2A37" />
<title>Allowance Passbook</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #F3EDDC;
    font-family: Georgia, "Iowan Old Style", serif;
    color: #2A3542;
    padding-bottom: 48px;
  }
  .cover {
    background: #1F2A37;
    color: #F3EDDC;
    padding: 28px 20px 22px;
    border-bottom: 3px double #C9A66B;
  }
  .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #C9A66B; margin-bottom: 4px; }
  .title { font-size: 26px; font-weight: 700; margin-bottom: 14px; }
  .cards { display: flex; gap: 10px; }
  .card {
    flex: 1; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px;
  }
  .card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #C9C4B4; margin-top: 6px; }
  .card .amt { font-size: 15px; font-weight: 700; color: #F3EDDC; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .tabs { display: flex; margin: 18px 16px 0; border-bottom: 1px solid rgba(42,53,66,0.2); }
  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 0; background: transparent; border: none; border-bottom: 2px solid transparent;
    color: #8A8371; font-family: inherit; font-size: 14px; cursor: pointer;
  }
  .tab.active { border-bottom: 2px solid #C9A66B; color: #2A3542; font-weight: 700; }
  .panel { margin: 16px 16px 0; background: #FFFDF7; border: 1px solid #E4D9BC; border-radius: 12px; padding: 16px; }
  label.field { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8A8371; display: block; margin-top: 14px; }
  label.field:first-child { margin-top: 0; }
  select, input[type=text] {
    width: 100%; margin-top: 6px; padding: 10px; border-radius: 8px; border: 1px solid #D8CCA8;
    background: #FBF7ED; font-family: inherit; font-size: 14px; outline: none;
  }
  .amount-row {
    display: flex; align-items: center; margin-top: 6px; border: 1px solid #D8CCA8;
    border-radius: 8px; background: #FBF7ED; padding: 0 10px;
  }
  .amount-row span { color: #8A8371; font-family: ui-monospace, monospace; }
  .amount-row input {
    flex: 1; border: none; background: transparent; padding: 10px 8px; font-size: 16px;
    font-family: ui-monospace, monospace; outline: none;
  }
  .bucket-choice { display: flex; gap: 8px; margin-top: 6px; }
  .bucket-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid #D8CCA8; background: #FBF7ED;
    color: #5B6572; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .bucket-btn.active-needs { border-color: #46586B; background: #46586B18; color: #46586B; }
  .bucket-btn.active-wants { border-color: #B9562E; background: #B9562E18; color: #B9562E; }
  .error { color: #B9562E; font-size: 13px; margin-top: 10px; }
  .submit-btn {
    width: 100%; margin-top: 16px; padding: 12px 0; border-radius: 8px; border: none;
    background: #1F2A37; color: #F3EDDC; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
  }
  .split-preview { margin-top: 12px; font-size: 12px; color: #5B6572; border-top: 1px dashed #D8CCA8; padding-top: 10px; }
  .split-preview .row { display: flex; justify-content: space-between; }
  .split-preview .row span:last-child { font-family: ui-monospace, monospace; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8A8371; margin: 20px 16px 8px; display: flex; align-items: center; gap: 6px; }
  .empty-note { margin: 0 16px; color: #8A8371; font-size: 13px; font-style: italic; }
  .entry {
    margin: 0 16px 8px; background: #FFFDF7; border: 1px solid #E4D9BC; border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .entry .amt { font-size: 13px; font-weight: 700; }
  .entry .amt.deposit { color: #2F6E4E; }
  .entry .amt.spend { color: #B9562E; }
  .entry .meta { font-size: 11px; color: #8A8371; }
  .del-btn { background: none; border: none; color: #C9A66B; cursor: pointer; padding: 6px; }
  .link-btn { background: none; border: none; color: #8A8371; font-size: 12px; text-decoration: underline; cursor: pointer; padding: 0; margin: 0 16px; }
  .backup-panel { margin: 10px 16px 0; background: #FFFDF7; border: 1px solid #E4D9BC; border-radius: 10px; padding: 14px; }
  textarea {
    width: 100%; font-size: 11px; font-family: ui-monospace, monospace; border: 1px solid #D8CCA8;
    border-radius: 8px; padding: 8px; background: #FBF7ED; resize: none;
  }
  .copy-btn {
    display: flex; align-items: center; gap: 5px; background: #1F2A37; color: #F3EDDC; border: none;
    border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer;
  }
  .copy-btn.copied { background: #2F6E4E; }
  .restore-btn {
    margin-top: 8px; width: 100%; padding: 10px 0; border-radius: 8px; border: none;
    background: #46586B; color: #F3EDDC; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .restore-btn:disabled { background: #C9C4B4; cursor: default; }
  .msg-ok { color: #2F6E4E; }
  .msg-bad { color: #B9562E; }
  #toast {
    position: fixed; bottom: 20px; left: 16px; right: 16px; background: #2F6E4E; color: #F3EDDC;
    border-radius: 10px; padding: 12px 14px; display: none; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.25); z-index: 50;
  }
  #installBtn {
    display: none; margin: 12px 16px 0; width: calc(100% - 32px); padding: 10px 0; border-radius: 8px;
    border: 1px dashed #C9A66B; background: transparent; color: #1F2A37; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  svg { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<div class="cover">
  <div class="eyebrow">Personal Ledger</div>
  <div class="title">Allowance Passbook</div>
  <div class="cards">
    <div class="card" style="border:1px solid #46586B55">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#46586B" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      <div class="label">Needs</div>
      <div class="amt" id="totalNeeds">₱0.00</div>
    </div>
    <div class="card" style="border:1px solid #B9562E55">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B9562E" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <div class="label">Wants</div>
      <div class="amt" id="totalWants">₱0.00</div>
    </div>
    <div class="card" style="border:1px solid #2F6E4E55">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2F6E4E" stroke-width="2"><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2h2v-4h-2c0-1-.5-1.7-1-2V5Z"/></svg>
      <div class="label">Savings</div>
      <div class="amt" id="totalSavings">₱0.00</div>
    </div>
  </div>
</div>

<button id="installBtn">📲 Install this app to your home screen</button>

<div class="tabs">
  <button class="tab active" id="tabDeposit" onclick="setTab('deposit')">⬇ Log Allowance</button>
  <button class="tab" id="tabSpend" onclick="setTab('spend')">⬆ Log Spend</button>
</div>

<div class="panel">
  <div id="depositFields">
    <label class="field">Which allowance is this?</label>
    <select id="phaseSelect" onchange="renderSplitPreview()">
      <option value="phase1">Bonus (2-month lump) — 50/30/20</option>
      <option value="phase2">Regular ₱1,000/mo — 60/40</option>
      <option value="windfall">Surprise / out-of-the-blue — 70/30</option>
    </select>
  </div>
  <div id="spendFields" style="display:none">
    <label class="field">Spend from</label>
    <div class="bucket-choice">
      <button class="bucket-btn active-needs" id="btnNeeds" onclick="setSpendBucket('needs')">Needs</button>
      <button class="bucket-btn" id="btnWants" onclick="setSpendBucket('wants')">Wants</button>
    </div>
  </div>

  <label class="field">Amount</label>
  <div class="amount-row">
    <span>₱</span>
    <input type="number" inputmode="decimal" id="amountInput" placeholder="0.00" oninput="renderSplitPreview()" />
  </div>

  <label class="field">Note (optional)</label>
  <input type="text" id="noteInput" placeholder="e.g. May allowance" />

  <div id="formError" class="error" style="display:none"></div>

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">＋ Split &amp; Log</button>

  <div id="splitPreview" class="split-preview" style="display:none"></div>
</div>

<div class="section-label">🧾 History</div>
<div id="historyList"></div>

<button class="link-btn" id="backupToggle" onclick="toggleBackup()">Backup &amp; restore (in case entries ever reset)</button>
<div class="backup-panel" id="backupPanel" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8A8371;">Your data</div>
    <button class="copy-btn" id="copyBtn" onclick="copyBackup()">Copy</button>
  </div>
  <textarea id="backupText" rows="3" readonly onclick="this.select()"></textarea>
  <div style="font-size:11px; color:#8A8371; margin-top:4px;">Tap Copy, then paste into a new Note and save it.</div>

  <div style="font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8A8371; margin-top:16px; margin-bottom:6px;">Restore from a backup</div>
  <textarea id="restoreInput" rows="3" placeholder="Paste your saved backup text here" oninput="document.getElementById('restoreBtn').disabled = !this.value.trim()"></textarea>
  <button class="restore-btn" id="restoreBtn" disabled onclick="restoreFromBackup()">Restore</button>
  <div id="restoreMsg" style="font-size:12px; margin-top:8px; display:none;"></div>
  <div style="font-size:11px; color:#8A8371; margin-top:10px;">Restoring replaces everything currently shown with the backup you paste in.</div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'passbook-entries-v1';
const PHASES = {
  phase1: { needs: 0.5, wants: 0.3, savings: 0.2 },
  phase2: { needs: 0, wants: 0.6, savings: 0.4 },
  windfall: { needs: 0, wants: 0.7, savings: 0.3 },
};
const bucketLabel = { needs: 'Needs', wants: 'Wants', savings: 'Savings' };

let entries = [];
let tab = 'deposit';
let spendBucket = 'needs';

function peso(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  } catch { entries = []; }
  renderAll();
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch {
    showToast("Couldn't save — check your device storage.", true);
  }
}

function getTotals() {
  const t = { needs: 0, wants: 0, savings: 0 };
  entries.forEach((e) => {
    if (e.type === 'deposit') {
      t.needs += e.needs; t.wants += e.wants; t.savings += e.savings;
    } else {
      t[e.bucket] -= e.amount;
    }
  });
  return t;
}

function setTab(t) {
  tab = t;
  document.getElementById('tabDeposit').classList.toggle('active', t === 'deposit');
  document.getElementById('tabSpend').classList.toggle('active', t === 'spend');
  document.getElementById('depositFields').style.display = t === 'deposit' ? 'block' : 'none';
  document.getElementById('spendFields').style.display = t === 'spend' ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = t === 'deposit' ? '＋ Split & Log' : '＋ Log Spend';
  hideError();
  renderSplitPreview();
}

function setSpendBucket(b) {
  spendBucket = b;
  document.getElementById('btnNeeds').className = 'bucket-btn' + (b === 'needs' ? ' active-needs' : '');
  document.getElementById('btnWants').className = 'bucket-btn' + (b === 'wants' ? ' active-wants' : '');
}

function hideError() {
  document.getElementById('formError').style.display = 'none';
}
function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderSplitPreview() {
  const el = document.getElementById('splitPreview');
  const amt = parseFloat(document.getElementById('amountInput').value);
  if (tab !== 'deposit' || !amt || amt <= 0) { el.style.display = 'none'; return; }
  const p = PHASES[document.getElementById('phaseSelect').value];
  let html = '';
  Object.entries(p).forEach(([k, v]) => {
    if (v > 0) html += `<div class="row"><span>${k[0].toUpperCase()+k.slice(1)}</span><span>${peso(amt * v)}</span></div>`;
  });
  el.innerHTML = html;
  el.style.display = 'block';
}

function handleSubmit() {
  hideError();
  const amt = parseFloat(document.getElementById('amountInput').value);
  const note = document.getElementById('noteInput').value.trim();
  if (!amt || amt <= 0) { showError('Enter a valid amount.'); return; }

  if (tab === 'deposit') {
    const phaseKey = document.getElementById('phaseSelect').value;
    const p = PHASES[phaseKey];
    entries.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
      type: 'deposit', phase: phaseKey, amount: amt,
      needs: +(amt*p.needs).toFixed(2), wants: +(amt*p.wants).toFixed(2), savings: +(amt*p.savings).toFixed(2),
      note, date: new Date().toISOString(),
    });
    showToast(`Logged ${peso(amt)} and split it into your buckets.`);
  } else {
    const totals = getTotals();
    if (amt > totals[spendBucket] + 0.001) { showError(`Only ${peso(totals[spendBucket])} left in ${bucketLabel[spendBucket]}.`); return; }
    entries.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
      type: 'spend', bucket: spendBucket, amount: amt, note, date: new Date().toISOString(),
    });
    showToast(`Logged ${peso(amt)} spent from ${bucketLabel[spendBucket]}.`);
  }
  document.getElementById('amountInput').value = '';
  document.getElementById('noteInput').value = '';
  save();
  renderAll();
  renderSplitPreview();
}

function removeEntry(id) {
  entries = entries.filter((e) => e.id !== id);
  save();
  renderAll();
  showToast('Entry deleted.');
}

function renderTotals() {
  const t = getTotals();
  document.getElementById('totalNeeds').textContent = peso(t.needs);
  document.getElementById('totalWants').textContent = peso(t.wants);
  document.getElementById('totalSavings').textContent = peso(t.savings);
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-note">No entries yet — log your first allowance above.</div>';
    return;
  }
  el.innerHTML = entries.map((e) => {
    const dateStr = new Date(e.date).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
    const label = e.type === 'deposit'
      ? `+ ${peso(e.amount)} deposited`
      : `− ${peso(e.amount)} from ${bucketLabel[e.bucket]}`;
    const cls = e.type === 'deposit' ? 'deposit' : 'spend';
    return `<div class="entry">
      <div>
        <div class="amt ${cls}">${label}</div>
        <div class="meta">${dateStr}${e.note ? ' · ' + escapeHtml(e.note) : ''}</div>
      </div>
      <button class="del-btn" onclick="removeEntry('${e.id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAll() {
  renderTotals();
  renderHistory();
  document.getElementById('backupText').value = JSON.stringify(entries);
}

function toggleBackup() {
  const panel = document.getElementById('backupPanel');
  const showing = panel.style.display === 'block';
  panel.style.display = showing ? 'none' : 'block';
  document.getElementById('backupToggle').textContent = showing
    ? 'Backup & restore (in case entries ever reset)'
    : 'Hide backup & restore';
  if (!showing) document.getElementById('backupText').value = JSON.stringify(entries);
}

function copyBackup() {
  const text = document.getElementById('backupText').value;
  const btn = document.getElementById('copyBtn');
  const done = () => { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => showRestoreMsg("Couldn't auto-copy — tap the box, select all, and copy manually.", false));
  } else {
    showRestoreMsg("Couldn't auto-copy — tap the box, select all, and copy manually.", false);
  }
}

function showRestoreMsg(msg, ok) {
  const el = document.getElementById('restoreMsg');
  el.textContent = msg;
  el.className = ok ? 'msg-ok' : 'msg-bad';
  el.style.display = 'block';
}

function restoreFromBackup() {
  const raw = document.getElementById('restoreInput').value;
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error('bad');
    entries = parsed;
    save();
    renderAll();
    showRestoreMsg('Restored ' + parsed.length + ' entries.', true);
    document.getElementById('restoreInput').value = '';
    document.getElementById('restoreBtn').disabled = true;
    showToast('Backup restored.');
  } catch {
    showRestoreMsg("That text doesn't look like a valid backup.", false);
  }
}

let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#B9562E' : '#2F6E4E';
  el.style.display = 'flex';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

load();
</script>
</body>
</html>
